{% extends "layout.html" %}
{% block title %}部署登録・編集{% endblock %}

{% block content %}
<h2>部署登録・編集</h2>
<form method="POST">
    {{ form.hidden_tag() }}
    <p>
        {{ form.name.label }}<br>
        {{ form.name(size=32) }}
        {% for error in form.name.errors %}
            <span style="color: red;">[{{ error }}]</span>
        {% endfor %}
    </p>
    <p>{{ form.submit() }}</p>
</form>
<br>
<a href="{{ url_for('departments') }}">キャンセル（一覧に戻る）</a>
{% endblock %}
