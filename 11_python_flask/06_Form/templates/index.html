<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css' )}}">
</head>
<body>

    <p>{{message}}</p>
    <a href="{{ url_for('index2',id='aaa', name='bbb' ) }}">Next</a>

        </form>
