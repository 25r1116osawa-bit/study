{% extends "base.html" %}
{% block content %}

<h1>管理者画面</h1>
<a href="/create" class="btn">新規登録</a>

<table border="1" cellpadding="5" cellspacing="0">
    <thead>
        <tr>
            <th>ID</th>
            <th>名前</th>
            <th>メール</th>
            <th>役割</th>
            <th>操作</th>
        </tr>
    </thead>

    <tbody>
    {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.mail }}</td>
            <td>{{ user.role }}</td>

            <td>
                <a href="/{{ user.id }}/update" class="btn">更新</a>
                <a href="/{{ user.id }}/delete" class="btn btn-danger">削除</a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

<style>
.btn {
    display: inline-block;
    padding: 5px 10px;
    margin-right: 5px;
    background-color: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 4px;
}
.btn:hover {
    background-color: #2980b9;
}
.btn-danger {
    background-color: #e74c3c;
}
.btn-danger:hover {
    background-color: #c0392b;
}
</style>

{% endblock %}
