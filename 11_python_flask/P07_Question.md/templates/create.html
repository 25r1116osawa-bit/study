{% extends "base.html" %}
{% block content %}

<h1>新規登録</h1>
<form method="POST">
    <!-- name="name" の""の中身がapp.pyに渡される。-->
    <label for="name">名前</label>
    <input type="text" name="name" id="name">

    <label for="mail">メールアドレス</label>
    <input type="email" name="email" id="mail">

    <label for="pass">パスワード</label>
    <input type="password" name="password" id="pass">

    <label for="role">ロール</label>
    <select name="role" id="role">
        <option value="">--選択してください--</option>
        <option value="user">ユーザ</option>
        <option value="admin">管理者</option>
    </select>


    <input type="submit" name="新規登録" value="登録">


</form>


<h1>勤怠打刻</h1>

<form method="POST" action="/clock_in">
    <button type="submit">出勤</button>
</form>

<form method="POST" action="/break_start">
    <button type="submit">休憩開始</button>
</form>

<form method="POST" action="/break_end">
    <button type="submit">休憩終了</button>
</form>

<form method="POST" action="/clock_out">
    <button type="submit">退勤</button>
</form>

{% endblock %}
