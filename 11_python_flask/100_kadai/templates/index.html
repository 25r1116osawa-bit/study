{% extends "base.html" %}

{% block content %}
<h2>ホーム</h2>
<p>現在のユーザー: 
    <strong>
        {% if current_user.is_authenticated %}
            {{ current_user.username }}
        {% else %}
            ゲスト
        {% endif %}
    </strong>
</p>

{% if current_user.is_authenticated %}
    <p>ログインに成功しています！</p>
{% else %}
    <p>ゲストとして閲覧しています。ログインまたは新規登録を行ってください。</p>
{% endif %}
{% endblock %}
