<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>

<body>
   <div>

        <h1>Todoアプリ</h1>
        <div class="inputArea">
            <form action="{{url_for('add')}}" method="POST">
                <input type="text" name="todo" id="todo" placeholder="メモを追加">
                <input type="submit" value="add">
            </form>
        </div>

        <div>
            <ul>
                {% for t in titles %}
                <li>{{t}}</li>
                {% endfor %}
            </ul>

        </div>
       {% for  p in  post %}
       <ul>
         <li>{{p.title}}</li>
         <li>{{p.body}}</li>
         <li>{{p.crieated}}</li>
       </ul>
       {% endfor %}


    </div>

</body>

</html>
