apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask
        image: my-flask-app:v1.0
        imagePullPolicy: IfNotPresent # ローカルビルドしたイメージを使用
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app  # WebコンテナのProxyPass先
spec:
  ports:
  - port: 8080
  selector:
    app: flask