apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: wordpress
        image: my-wp-app:v1.0
        imagePullPolicy: IfNotPresent # ローカルビルドしたイメージを使用
        ports:
        - containerPort: 80
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: LoadBalancer # Windowsのブラウザからアクセス可能にする
  ports:
  - name: wp-http
    port: 80
    targetPort: 80
  - name: flask-proxy
    port: 8080
    targetPort: 8080
  selector:
    app: web